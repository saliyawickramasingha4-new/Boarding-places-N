<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home | StayNest</title>
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-frame">
  
  <!-- The Navbar and Header will be dynamically injected by navbar.js -->

  <main class="main-wrapper">
    <div class="content-body">
      
      <!-- HERO — Re-scaled clean landing section -->
      <section class="hero">
        <div class="hero-content">
          <span class="hero-eyebrow">Sabaragamuwa University of Sri Lanka</span>

          <h1>The best way to find your <span class="gradient-text">boarding place.</span></h1>

          <p class="hero-desc">
            Browse verified, affordable boarding houses near Belihuloya and Pambahinna — built exclusively for SUSL students and room owners.
          </p>

          <div class="hero-actions" id="heroActions">
            <!-- Dynamically populated based on auth status -->
            <a href="search.html" class="btn btn-primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              Start Searching
            </a>
            <a href="explore_map.html" class="btn btn-outline">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7"/><path d="M9 4v13M15 7v13"/></svg>
              Explore Map
            </a>
          </div>
        </div>

        <div class="hero-visual">
          <img src="images/boarding_house_3d_hero.png" alt="StayNest boarding place illustration" />
        </div>
      </section>

    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/navbar.js"></script>
<script type="module">
  import { auth, onAuthStateChanged } from "./js/firebase-config.js";

  onAuthStateChanged(auth, (user) => {
    const heroActions = document.getElementById("heroActions");
    if (!heroActions) return;

    if (user) {
      heroActions.innerHTML = `
        <a href="search.html" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Start Searching
        </a>
        <a href="explore_map.html" class="btn btn-outline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7"/><path d="M9 4v13M15 7v13"/></svg>
          Explore Map
        </a>
      `;
    } else {
      heroActions.innerHTML = `
        <a href="auth.html?mode=register" class="btn btn-primary">
          Get Started — It's Free
        </a>
        <a href="auth.html?mode=login" class="btn btn-outline">Sign In</a>
      `;
    }
  });
</script>
<script src="js/script.js"></script>
</body>
</html>
