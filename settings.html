<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Settings | StayNest</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-frame">

  <main class="main-wrapper">
    <div class="content-body">
      
      <div class="auth-page" style="min-height: auto; padding: 2rem 0;">
          <div class="auth-card card" style="max-width: 500px; width: 100%;">
              <div class="text-center mb-4">
                  <div id="settings-avatar" style="width: 80px; height: 80px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 2rem; margin: 0 auto 1.5rem;">
                      U
                  </div>
                  <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Account Settings</h2>
                  <p class="text-muted">Update your personal information and security settings.</p>
              </div>

              <form id="settings-form">
                  <div class="input-group">
                      <label>Full Name</label>
                      <div class="input-with-icon">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                          <input type="text" id="settings-fullname" required>
                      </div>
                  </div>

                  <div class="input-group">
                      <label>Email Address (Read-only)</label>
                      <div class="input-with-icon">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                          <input type="email" id="settings-email" disabled style="background: var(--bg); color: var(--text-muted); cursor: not-allowed;">
                      </div>
                  </div>

                  <div class="auth-divider"><span>Security</span></div>

                  <div class="input-group">
                      <label>New Password (Leave blank to keep current)</label>
                      <div class="input-with-icon">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                          <input type="password" id="settings-password" placeholder="••••••••">
                      </div>
                  </div>

                  <div style="margin-top: 2rem;">
                      <button type="submit" class="btn btn-primary btn-full" style="height: 56px; font-size: 1.1rem;">Save Profile Changes</button>
                      <a href="index.html" class="btn btn-outline btn-full" style="margin-top: 1rem; text-align: center; display: block; line-height: 42px; text-decoration: none;">Back to Home</a>
                  </div>
              </form>
          </div>
      </div>

    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/navbar.js"></script>
<script type="module">
  import { auth, db, ref, get, update, updatePassword } from "./js/firebase-config.js";

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = "auth.html";
      return;
    }

    try {
      const userSnap = await get(ref(db, "users/" + user.uid));
      if (userSnap.exists()) {
        const userData = userSnap.val();
        document.getElementById("settings-fullname").value = userData.full_name || "";
        document.getElementById("settings-email").value = userData.email || "";
        document.getElementById("settings-avatar").textContent = (userData.full_name || "U")[0].toUpperCase();
      }
    } catch(err) {
      console.error(err);
    }
  });

  document.getElementById("settings-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const user = auth.currentUser;
    if (!user) return;

    const newName = document.getElementById("settings-fullname").value.trim();
    const newPass = document.getElementById("settings-password").value;

    try {
      // 1. Update Realtime Database profile details
      await update(ref(db, "users/" + user.uid), {
        full_name: newName
      });

      // 2. Update password if provided
      if (newPass) {
        await updatePassword(user, newPass);
      }

      showToast("Profile updated successfully!");
      document.getElementById("settings-avatar").textContent = newName[0].toUpperCase();
    } catch(err) {
      console.error(err);
      showToast("Error saving updates. Re-authenticate if changing password.", "error");
    }
  });
</script>
<script src="js/script.js"></script>
</body>
</html>
